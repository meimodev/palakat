<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Palakat Super Admin web application.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Palakat Super Admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Palakat Super Admin</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      background:
        radial-gradient(circle at 50% 20%, rgba(20, 184, 166, 0.22), transparent 34%),
        linear-gradient(180deg, #f4fffd 0%, #ecfeff 100%);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body:not(.flutter-ready) {
      overflow: hidden;
    }

    #boot-loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: inherit;
      transition: opacity 220ms ease, visibility 220ms ease;
      z-index: 9999;
    }

    body.flutter-ready #boot-loader {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .super-loader-shell {
      width: min(100%, 440px);
      padding: 32px 28px;
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(45, 212, 191, 0.28);
      box-shadow: 0 24px 60px rgba(13, 148, 136, 0.16);
      backdrop-filter: blur(14px);
      text-align: center;
    }

    .super-loader-stage {
      position: relative;
      width: 112px;
      height: 112px;
      margin: 0 auto 22px;
      border-radius: 999px;
      background: linear-gradient(180deg, rgba(20, 184, 166, 0.16), rgba(13, 148, 136, 0.06));
      border: 1px solid rgba(45, 212, 191, 0.36);
    }

    .super-loader-ring,
    .super-loader-core,
    .super-loader-dot {
      position: absolute;
      inset: 0;
      margin: auto;
      border-radius: 999px;
    }

    .super-loader-ring {
      width: 100%;
      height: 100%;
      border: 2px solid rgba(13, 148, 136, 0.16);
    }

    .super-loader-ring::after {
      content: "";
      position: absolute;
      top: -6px;
      left: 50%;
      width: 12px;
      height: 12px;
      margin-left: -6px;
      border-radius: 999px;
      background: linear-gradient(180deg, #2dd4bf 0%, #0f766e 100%);
      box-shadow: 0 6px 14px rgba(13, 148, 136, 0.24);
    }

    .super-loader-ring.one {
      animation: superSpin 1.6s linear infinite;
    }

    .super-loader-ring.two {
      width: 76px;
      height: 76px;
      border-color: rgba(15, 118, 110, 0.2);
      animation: superSpinReverse 1.2s linear infinite;
    }

    .super-loader-ring.two::after {
      top: auto;
      bottom: -6px;
      background: linear-gradient(180deg, #5eead4 0%, #14b8a6 100%);
    }

    .super-loader-core {
      width: 42px;
      height: 42px;
      background: linear-gradient(180deg, #14b8a6 0%, #0f766e 100%);
      box-shadow: 0 14px 26px rgba(15, 118, 110, 0.22);
    }

    .super-loader-dot {
      width: 10px;
      height: 10px;
      background: rgba(20, 184, 166, 0.2);
    }

    .super-loader-dot.dot-a {
      transform: translate(-40px, 34px);
    }

    .super-loader-dot.dot-b {
      transform: translate(42px, -30px);
    }

    .super-loader-eyebrow {
      margin-bottom: 8px;
      color: #0f766e;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .super-loader-title {
      color: #0f172a;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.15;
    }

    .super-loader-subtitle {
      margin-top: 8px;
      color: #475569;
      font-size: 14px;
      line-height: 1.5;
    }

    @keyframes superSpin {
      from {
        transform: rotate(0deg);
      }
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes superSpinReverse {
      from {
        transform: rotate(360deg);
      }
      to {
        transform: rotate(0deg);
      }
    }

    @media (max-width: 520px) {
      .super-loader-shell {
        padding: 28px 24px;
        border-radius: 26px;
      }

      .super-loader-title {
        font-size: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #boot-loader,
      .super-loader-ring.one,
      .super-loader-ring.two {
        transition: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div id="boot-loader" aria-live="polite">
    <div class="super-loader-shell">
      <div class="super-loader-stage" aria-hidden="true">
        <div class="super-loader-ring one"></div>
        <div class="super-loader-ring two"></div>
        <div class="super-loader-core"></div>
        <div class="super-loader-dot dot-a"></div>
        <div class="super-loader-dot dot-b"></div>
      </div>
      <div class="super-loader-eyebrow">Palakat Super Admin</div>
      <div class="super-loader-title">Opening the control center</div>
      <div class="super-loader-subtitle">
        Syncing publishing tools, system management, and trusted operations.
      </div>
    </div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.body.classList.add('flutter-ready');
      window.setTimeout(function () {
        var loader = document.getElementById('boot-loader');
        if (loader) {
          loader.remove();
        }
      }, 240);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
