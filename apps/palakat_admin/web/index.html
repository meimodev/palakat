<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Palakat Admin web application.">
  <meta name="theme-color" content="#921573">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Palakat Admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Palakat Admin</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(146, 21, 115, 0.14), transparent 40%),
        linear-gradient(180deg, #fdf8fc 0%, #f6eef8 100%);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body:not(.flutter-ready) {
      overflow: hidden;
    }

    #boot-loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: inherit;
      transition: opacity 220ms ease, visibility 220ms ease;
      z-index: 9999;
    }

    body.flutter-ready #boot-loader {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .admin-loader-shell {
      width: min(100%, 360px);
      padding: 24px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(146, 21, 115, 0.14);
      box-shadow: 0 18px 42px rgba(107, 29, 132, 0.12);
    }

    .admin-loader-badge {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      margin-bottom: 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, #b24a96 0%, #6b1d84 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }

    .admin-loader-badge::before {
      content: "";
      width: 20px;
      height: 20px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.95);
      box-shadow: 0 0 0 6px rgba(255, 255, 255, 0.12);
    }

    .admin-loader-track {
      display: flex;
      gap: 8px;
      margin: 18px 0 16px;
    }

    .admin-loader-track span {
      flex: 1;
      height: 8px;
      border-radius: 999px;
      background: rgba(146, 21, 115, 0.12);
      overflow: hidden;
      position: relative;
    }

    .admin-loader-track span::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(90deg, rgba(178, 74, 150, 0.2), rgba(107, 29, 132, 0.95), rgba(178, 74, 150, 0.2));
      transform: translateX(-110%);
      animation: adminSweep 1.4s ease-in-out infinite;
    }

    .admin-loader-track span:nth-child(2)::before {
      animation-delay: 120ms;
    }

    .admin-loader-track span:nth-child(3)::before {
      animation-delay: 240ms;
    }

    .admin-loader-eyebrow {
      margin-bottom: 6px;
      color: #6b1d84;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .admin-loader-title {
      color: #111827;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.15;
    }

    .admin-loader-subtitle {
      margin-top: 10px;
      color: #475569;
      font-size: 14px;
      line-height: 1.5;
    }

    @keyframes adminSweep {
      0%,
      100% {
        transform: translateX(-110%);
      }
      60% {
        transform: translateX(110%);
      }
    }

    @media (max-width: 520px) {
      .admin-loader-shell {
        padding: 22px;
        border-radius: 22px;
      }

      .admin-loader-title {
        font-size: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #boot-loader,
      .admin-loader-track span::before {
        transition: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div id="boot-loader" aria-live="polite">
    <div class="admin-loader-shell">
       <div class="admin-loader-eyebrow">PALAKAT ADMIN</div>
      <div class="admin-loader-track" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
     
      <div class="admin-loader-title">Memuat Aplikasi ...</div>
      
    </div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.body.classList.add('flutter-ready');
      window.setTimeout(function () {
        var loader = document.getElementById('boot-loader');
        if (loader) {
          loader.remove();
        }
      }, 240);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
