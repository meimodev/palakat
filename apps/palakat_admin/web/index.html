<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Palakat Admin web application.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Palakat Admin">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Palakat Admin</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      background:
        radial-gradient(circle at top, rgba(99, 102, 241, 0.18), transparent 42%),
        linear-gradient(180deg, #f7f8ff 0%, #eef2ff 100%);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body:not(.flutter-ready) {
      overflow: hidden;
    }

    #boot-loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: inherit;
      transition: opacity 220ms ease, visibility 220ms ease;
      z-index: 9999;
    }

    body.flutter-ready #boot-loader {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .admin-loader-shell {
      width: min(100%, 420px);
      padding: 28px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid rgba(129, 140, 248, 0.24);
      box-shadow: 0 24px 60px rgba(79, 70, 229, 0.18);
      backdrop-filter: blur(14px);
    }

    .admin-loader-mark {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 20px;
    }

    .admin-loader-mark span {
      display: block;
      height: 56px;
      border-radius: 18px;
      background: linear-gradient(180deg, #818cf8 0%, #4f46e5 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3);
      animation: adminPulse 1.15s ease-in-out infinite;
      transform-origin: center bottom;
    }

    .admin-loader-mark span:nth-child(2) {
      animation-delay: 120ms;
    }

    .admin-loader-mark span:nth-child(3) {
      animation-delay: 240ms;
    }

    .admin-loader-eyebrow {
      margin-bottom: 8px;
      color: #4f46e5;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .admin-loader-title {
      color: #111827;
      font-size: 26px;
      font-weight: 700;
      line-height: 1.15;
    }

    .admin-loader-subtitle {
      margin-top: 8px;
      color: #475569;
      font-size: 14px;
      line-height: 1.5;
    }

    @keyframes adminPulse {
      0%,
      100% {
        transform: scaleY(0.72);
        opacity: 0.72;
      }
      50% {
        transform: scaleY(1);
        opacity: 1;
      }
    }

    @media (max-width: 520px) {
      .admin-loader-shell {
        padding: 24px;
        border-radius: 24px;
      }

      .admin-loader-title {
        font-size: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #boot-loader,
      .admin-loader-mark span {
        transition: none;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <div id="boot-loader" aria-live="polite">
    <div class="admin-loader-shell">
      <div class="admin-loader-mark" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="admin-loader-eyebrow">Palakat Admin</div>
      <div class="admin-loader-title">Preparing your workspace</div>
      <div class="admin-loader-subtitle">
        Loading dashboards, navigation, and church operations tools.
      </div>
    </div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.body.classList.add('flutter-ready');
      window.setTimeout(function () {
        var loader = document.getElementById('boot-loader');
        if (loader) {
          loader.remove();
        }
      }, 240);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
