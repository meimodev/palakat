name: Deploy Palakat Admin Web

on:
  push:
    tags:
      - 'deploy-admin*'

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: palakat-admin-web-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VERCEL_ORG_ID: ${{ secrets.PALAKAT_ADMIN_VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.PALAKAT_ADMIN_VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get workspace dependencies
        run: dart pub get

      - name: Generate Dart code
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: packages/palakat_shared

      - name: Generate admin Dart code
        run: dart run build_runner build --delete-conflicting-outputs
        working-directory: apps/palakat_admin

      - name: Write app environment
        env:
          APP_ENV: ${{ secrets.PALAKAT_ADMIN_WEB_ENV }}
        run: |
          set -euo pipefail

          if [ -z "${APP_ENV:-}" ]; then
            echo "PALAKAT_ADMIN_WEB_ENV is empty"
            exit 1
          fi

          python3 - <<'PY'
          import os
          from pathlib import Path

          raw = os.environ['APP_ENV']
          normalized = raw.replace('\r\n', '\n').replace('\r', '\n')
          if '\n' not in normalized and '\\n' in normalized:
              normalized = normalized.replace('\\n', '\n')

          path = Path('apps/palakat_admin/.env')
          path.write_text(normalized.rstrip('\n') + '\n', encoding='utf-8')
          PY

          grep -q '^API_BASE_URL=' apps/palakat_admin/.env
          grep -q '^API_BASE_VERSION=' apps/palakat_admin/.env

      - name: Build Flutter web
        run: flutter build web --release
        working-directory: apps/palakat_admin

      - name: Verify bundled env asset
        run: |
          set -euo pipefail
          test -s apps/palakat_admin/build/web/assets/.env
          grep -q '^API_BASE_URL=' apps/palakat_admin/build/web/assets/.env
          grep -q '^API_BASE_VERSION=' apps/palakat_admin/build/web/assets/.env

      - name: Copy Vercel config into build output
        run: cp apps/palakat_admin/vercel.json apps/palakat_admin/build/web/vercel.json

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.PALAKAT_ADMIN_VERCEL_TOKEN }}
        run: vercel deploy . --prod --token "$VERCEL_TOKEN" --yes
        working-directory: apps/palakat_admin/build/web
