name: Deploy Palakat Backend

on:
  push:
    tags:
      - 'deploy-backend*'

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build backend
        run: pnpm --dir apps/palakat_backend run build

      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME || secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
 
      - name: Get runner public IP
        id: runner_ip
        run: |
          IP=$(curl -fsS https://checkip.amazonaws.com | tr -d '\n')
          echo "ip=$IP" >> "$GITHUB_OUTPUT"

      - name: Authorize temporary SSH ingress
        run: |
          aws ec2 authorize-security-group-ingress \
            --region "${{ vars.AWS_REGION || secrets.AWS_REGION }}" \
            --group-id "${{ vars.EC2_SECURITY_GROUP_ID || secrets.EC2_SECURITY_GROUP_ID }}" \
            --ip-permissions '[
              {
                "IpProtocol": "tcp",
                "FromPort": '"${{ vars.EC2_PORT || secrets.EC2_PORT }}"',
                "ToPort": '"${{ vars.EC2_PORT || secrets.EC2_PORT }}"',
                "IpRanges": [
                  {
                    "CidrIp": "'"${{ steps.runner_ip.outputs.ip }}/32"'",
                    "Description": "GitHub Actions run '"${{ github.run_id }}"'"
                  }
                ]
              }
            ]'

      - name: Package release artifact
        run: |
          RELEASE_DIR=palakat_backend_release
          mkdir -p "$RELEASE_DIR"
          cp -R apps "$RELEASE_DIR/"
          cp pnpm-lock.yaml "$RELEASE_DIR/"
          cp pnpm-workspace.yaml "$RELEASE_DIR/"
          tar -czf palakat_backend_release.tar.gz -C "$RELEASE_DIR" .

      - name: Check TCP reachability to EC2 SSH
        run: |
            nc -vz ${{ vars.EC2_HOST || secrets.EC2_HOST }} ${{ vars.EC2_PORT || secrets.EC2_PORT }}
    
      - name: Upload artifact to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.EC2_HOST || secrets.EC2_HOST }}
          username: ${{ vars.EC2_USER || secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ vars.EC2_PORT || secrets.EC2_PORT }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          source: "palakat_backend_release.tar.gz"
          target: "/tmp"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.EC2_HOST || secrets.EC2_HOST }}
          username: ${{ vars.EC2_USER || secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ vars.EC2_PORT || secrets.EC2_PORT }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          script_stop: true
          script: |
            set -euo pipefail
            RELEASE_ID=$(date +%Y%m%d%H%M%S)
            RELEASE_DIR=/srv/palakat/backend/releases/$RELEASE_ID
            mkdir -p "$RELEASE_DIR"
            tar -xzf /tmp/palakat_backend_release.tar.gz -C "$RELEASE_DIR"
            cd "$RELEASE_DIR"
            pnpm --dir apps/palakat_backend install --frozen-lockfile
            sudo install -o ubuntu -g ubuntu -m 600 /etc/palakat/palakat_backend.env "$RELEASE_DIR/apps/palakat_backend/.env"
            pnpm --dir apps/palakat_backend run build
            cd "$RELEASE_DIR/apps/palakat_backend"
            pnpm run db:deploy
            ln -sfn "$RELEASE_DIR" /srv/palakat/backend/current
            sudo systemctl restart palakat-backend
            HEALTH_PAGE_SECRET=$(sudo grep '^HEALTH_PAGE_SECRET=' /etc/palakat/palakat_backend.env | cut -d= -f2-)
            for attempt in $(seq 1 30); do
              if curl -fsS -H "x-health-secret: ${HEALTH_PAGE_SECRET}" http://127.0.0.1:3000/health > /dev/null; then
                break
              fi

              if [ "$attempt" -eq 30 ]; then
                sudo systemctl status palakat-backend --no-pager || true
                sudo journalctl -u palakat-backend -n 200 --no-pager || true
                exit 1
              fi

              sleep 2
            done
            rm -f /tmp/palakat_backend_release.tar.gz
            
      - name: Revoke temporary SSH ingress
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --region "${{ vars.AWS_REGION || secrets.AWS_REGION }}" \
            --group-id "${{ vars.EC2_SECURITY_GROUP_ID || secrets.EC2_SECURITY_GROUP_ID }}" \
            --ip-permissions '[
              {
                "IpProtocol": "tcp",
                "FromPort": '"${{ vars.EC2_PORT || secrets.EC2_PORT }}"',
                "ToPort": '"${{ vars.EC2_PORT || secrets.EC2_PORT }}"',
                "IpRanges": [
                  {
                    "CidrIp": "'"${{ steps.runner_ip.outputs.ip }}/32"'"
                  }
                ]
              }
            ]'
